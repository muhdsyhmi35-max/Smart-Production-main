<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TF 2 Production Monitoring</title>
<link rel="stylesheet" href="./style.css">

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
</head>

<body>
<div class="app-shell">
  <header class="top-header">
    <div class="header-title">TF 2 PRODUCTION MONITORING SYSTEM</div>
    <button class="fullscreen-btn" onclick="toggleFullScreen()" aria-label="Toggle fullscreen">⛶</button>
  </header>

  <section class="datetime-panel">
    <div id="dateDisplay"></div>
    <div id="clock"></div>
  </section>

  <section class="toolbar card-panel">
    <label class="control-field">
      <span>Cycle Time (min):</span>
      <input type="number" id="cycleTarget" min="1">
    </label>

    <label class="control-field">
      <span>Daily Plan:</span>
      <input type="number" id="dailyPlanTarget" min="1">
    </label>

    <label class="control-field lot-field">
      <span>Lot:</span>
      <input type="text" id="lotInput" placeholder="Lot No">
    </label>

    <button class="action-btn start" onclick="startProduction()">Start</button>
    <button class="action-btn stop" onclick="stopProduction()">Stop</button>
    <button class="action-btn reset" onclick="resetProduction()">Reset</button>
    <button class="action-btn summary" onclick="openSummary()">Summary</button>
    <button class="action-btn utility" id="ramadanToggle" onclick="toggleRamadan()">Ramadhan : OFF</button>
  </section>

  <main class="main-grid">
    <section class="left-column">
      <div class="panel-card scan-panel">
        <div class="panel-title">Scan Input</div>
        <div class="scan-stack">
          <div class="scan-row">
            <span class="scan-icon">1</span>
            <input type="text" id="chassisInput" class="scan-box" placeholder="Scan Chassis" autofocus>
          </div>
          <div class="scan-row">
            <span class="scan-icon">2</span>
            <input type="text" id="modelInput" class="scan-box" placeholder="Scan Model">
          </div>
          <div class="scan-row">
            <span class="scan-icon">3</span>
            <input type="text" id="engineInput" class="scan-box" placeholder="Scan Engine No">
          </div>
          <div class="scan-row">
            <span class="scan-icon">4</span>
            <input type="text" id="keyInput" class="scan-box" placeholder="Scan Key No">
          </div>
        </div>
      </div>

      <div class="panel-card status-panel">
        <div class="panel-title">Line Status</div>
        <div class="status-display">
          <div class="big-number" id="status">READY</div>
          <div class="status-subtext">Waiting to Start</div>
        </div>
      </div>
    </section>

    <section class="metrics-column">
      <div class="metric-card countdown-card">
        <h3>Countdown</h3>
        <div class="big-number" id="countdown">00:00</div>
      </div>

      <div class="metric-row two-col">
        <div class="metric-card actual-card">
          <h3>Actual</h3>
          <div class="big-number status-green" id="actual">0</div>
        </div>
        <div class="metric-card expected-card">
          <h3>Expected</h3>
          <div class="big-number status-blue" id="expected">0</div>
        </div>
      </div>

      <div class="metric-row two-col">
        <div class="metric-card">
          <h3>Plan</h3>
          <div class="big-number" id="plan">0</div>
        </div>
        <div class="metric-card">
          <h3>Balance</h3>
          <div class="big-number" id="balance">0</div>
        </div>
      </div>
    </section>

    <section class="right-column">
      <div class="metric-card right-card">
        <h3>Delay</h3>
        <div class="big-number" id="delay">0</div>
      </div>

      <div class="metric-card right-card downtime-card" id="downtimeCard">
        <h3>Downtime</h3>
        <div class="big-number" id="downtime">00:00</div>
      </div>

      <div class="metric-card right-card efficiency-card">
        <h3>Efficiency</h3>
        <div class="big-number" id="efficiency">0%</div>
      </div>
    </section>
  </main>

  <section class="history-section panel-card">
    <div class="panel-title">Production History</div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Lot</th>
            <th>Model</th>
            <th>Chassis</th>
            <th>Engine No</th>
            <th>Key No</th>
            <th>Status</th>
            <th>Downtime</th>
          </tr>
        </thead>
        <tbody id="scanTable"></tbody>
      </table>
    </div>
  </section>
</div>

<script src="./Smart-Production-main/script.js"></script>
</body>
</html>
